name: Build

on: [push]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}
      - name: Build using local cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/raffaello/bros:latest
          cache-from: type=registry,ref=bros:cache
          cache-to: type=registry,ref=bros:cache,mode=max
  ##############################################################
  ubuntu-build:
    strategy:
      matrix:
        BUILD_TYPE: ["debug", "release", "reldbg"]
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      # - run: sudo apt-get -y install mtools
      # - run: gcc -v
      # - run: make BUILD_TYPE=${{ matrix.BUILD_TYPE }} clean all
      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}
      - name: Pull image
        run: docker pull ghcr.io/raffaello/bros:latest
      - name: docker make
        run: docker run --rm -v .:/code:Z bros /bin/bash -c "make BUILD_TYPE=${{ matrix.BUILD_TYPE }} clean all"
